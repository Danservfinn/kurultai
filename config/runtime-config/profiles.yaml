profiles:
  kublai:
    role: caretaker_orchestrator
    provider: openai-codex
    model: gpt-5.5
    notes: "Default internal id for the main chair; user-visible display name is chosen during install via identity.yaml / identity.generated.yaml."
  batu:
    role: research_retrieval_intake
    provider: openai-codex
    model: gpt-5.5
    notes: "Research return path and retrieval/intake specialist; routes high-signal findings back to Kublai for verification."
  temujin:
    role: developer
    provider: openai-codex
    model: gpt-5.5
  coder:
    role: implementation_worker
    provider: openai-codex
    model: gpt-5.5
    routing: optional_private_worker
    notes: "Optional implementation worker profile used on hosts that preserve the private coding lane."
  codex:
    role: codex_cli_compatibility
    provider: openai-codex
    model: gpt-5.5
    routable: false
    notes: "Pseudo/compatibility profile for Codex CLI workflows; do not route ordinary Kurultai work here unless a host explicitly enables it."
  mongke:
    role: research
    provider: openai-codex
    model: gpt-5.5
  jochi:
    role: analyst
    provider: openai-codex
    model: gpt-5.5
  ogedei:
    role: operations
    provider: openai-codex
    model: gpt-5.5
  chagatai:
    role: writer
    provider: openai-codex
    model: gpt-5.5
  subc:
    role: subconscious_dreamer_signal_layer
    provider: openai-codex
    model: gpt-5.5
    routing: background_signal_layer
    notes: "Subconscious/Dreamer lane for pattern noticing, retrospectives, and candidate signals; durable promotion remains Kublai-reviewed."
  tolui:
    role: local_lightweight_worker
    provider: local-auto
    model: Jackrong/Qwen3.5-9B-DeepSeek-V4-Flash-GGUF
    runtime_preference:
      - ollama-hf-gguf
      - llama.cpp-openai-compatible
    fallback_policy: "Select the strongest local Qwen/Gemma-class model that fits host RAM/VRAM; keep triage-only until tool calls are verified."
    notes: "Local model lane for low-cost triage/summarization/classification; no Z.AI/GLM fallback."
