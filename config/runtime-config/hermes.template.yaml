runtime:
  identity: kublai
  default_provider: openai-codex
  default_model: gpt-5.5
  context_length: 1000000

compression:
  enabled: true
  threshold: 0.25
  rationale: "Main model context is 1M, but compression must fit the smaller auxiliary compression model context with headroom."

local_llm:
  enabled: true
  owner_profile: tolui
  provider: local-auto
  preferred_model: Jackrong/Qwen3.5-9B-DeepSeek-V4-Flash-GGUF
  runtime_preference:
    - ollama-hf-gguf
    - llama.cpp-openai-compatible
  fallback_policy: "Pick the strongest local Qwen/Gemma-class model that fits host RAM/VRAM; keep no-tool-call/lightweight-only until verified."

security:
  parse_screening_enabled: true
  protected_file_flow: hermes-self-mod
  private_value_placeholder: "[REDACTED]"

memory:
  enabled: true
  user_profile_enabled: true
  session_history:
    source_of_record: "~/.hermes/sessions"
    retrieval: session_search
    auto_prune: false

coordination:
  substrate: native-hermes
  kanban_db: "~/.hermes/kanban.db"
  profiles:
    - kublai
    - batu
    - temujin
    - coder
    - codex
    - mongke
    - jochi
    - ogedei
    - chagatai
    - subc
    - tolui
  default_workers:
    - batu
    - temujin
    - coder
    - mongke
    - jochi
    - ogedei
    - chagatai
    - subc
    - tolui
  non_routable_profiles:
    - codex

brain:
  wiki_root: "${BRAIN_ROOT}"
  public_index: "~/.brain-index/brain.db"
  private_index: "~/.kublai/brain-index-private/brain.db"
  public_gateway: "127.0.0.1:8765"
