version: '3.8'

services:
  antigravity:
    build: .
    container_name: kurultai-antigravity
    ports:
      - "3000:3000"
    volumes:
      - ./workspace:/workspace
      - ./config:/config
      - ../..:/kurultai  # Mount Kurultai codebase
    environment:
      - DISPLAY=:99
      - ANTIGRAVITY_API_KEY=${ANTIGRAVITY_API_KEY}
    networks:
      - kurultai-network

  # Integration service
  antigravity-bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile.bridge
    container_name: antigravity-bridge
    ports:
      - "8765:8765"
    volumes:
      - ../../tools:/app/tools
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ANTIGRAVITY_HOST=host.docker.internal
      - ANTIGRAVITY_PORT=3000
      - KURULTAI_API=http://host.docker.internal:8082
    networks:
      - kurultai-network
    depends_on:
      - antigravity

networks:
  kurultai-network:
    driver: bridge
