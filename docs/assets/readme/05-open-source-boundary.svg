<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840" role="img" aria-labelledby="title desc">
  <title id="title">Open-source boundary</title>
  <desc id="desc">The repository is MIT-licensed and reusable while secrets and private operator state remain local.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="12%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#8b5cf6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#334155" stroke-opacity="0.32" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#a78bfa"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .title { font: 800 46px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; letter-spacing: -1.4px; }
      .subtitle { font: 500 19px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .label { font: 800 21px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; }
      .small { font: 650 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .tiny { font: 650 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #94a3b8; }
      .chip { font: 800 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #020617; letter-spacing: .4px; }
      .card { fill: #0f172a; stroke: #334155; stroke-width: 1.4; filter: url(#shadow); }
      .cyan { stroke: #22d3ee; fill: rgba(8, 51, 68, 0.82); }
      .emerald { stroke: #34d399; fill: rgba(6, 78, 59, 0.82); }
      .violet { stroke: #a78bfa; fill: rgba(76, 29, 149, 0.82); }
      .amber { stroke: #fbbf24; fill: rgba(120, 53, 15, 0.78); }
      .rose { stroke: #fb7185; fill: rgba(136, 19, 55, 0.72); }
      .slate { stroke: #94a3b8; fill: rgba(30, 41, 59, 0.82); }
      .arrow { fill: none; stroke: #67e8f9; stroke-width: 3.2; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow2 { fill: none; stroke: #a78bfa; stroke-width: 3; marker-end: url(#arrow2); stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <circle cx="72" cy="70" r="9" fill="#22d3ee" opacity=".95"/>
  <text x="96" y="84" class="title">Open-source boundary</text>
  <text x="98" y="118" class="subtitle">The repository is MIT-licensed and reusable while secrets and private operator state remain local.</text>
  
<path class="arrow" d="M336 318 C430 250 520 250 614 318"/>
<path class="arrow" d="M786 318 C880 250 970 250 1064 318"/>
<path class="arrow2" d="M614 538 C520 606 430 606 336 538"/>
<path class="arrow2" d="M1064 538 C970 606 880 606 786 538"/>

<rect x="112" y="238" width="250" height="160" rx="26" class="card cyan"/>
<text x="170" y="288" class="label">Public Git</text>
<text x="148" y="320" class="small">source, docs, manifests</text>
<text x="148" y="350" class="tiny">MIT license • reproducible setup</text>

<rect x="574" y="238" width="250" height="160" rx="26" class="card emerald"/>
<text x="628" y="288" class="label">Local Runtime</text>
<text x="610" y="320" class="small">Hermes home + profiles</text>
<text x="610" y="350" class="tiny">tokens, auth, sessions untracked</text>

<rect x="1038" y="238" width="250" height="160" rx="26" class="card violet"/>
<text x="1096" y="288" class="label">Community</text>
<text x="1076" y="320" class="small">fork, adapt, inspect</text>
<text x="1076" y="350" class="tiny">no private operator state required</text>

<rect x="350" y="512" width="260" height="148" rx="26" class="card amber"/>
<text x="418" y="560" class="label">Boundary</text>
<text x="388" y="592" class="small">sanitized rebuild contract</text>
<text x="388" y="622" class="tiny">placeholders, not secrets</text>

<rect x="786" y="512" width="260" height="148" rx="26" class="card rose"/>
<text x="852" y="560" class="label">Autonomy</text>
<text x="824" y="592" class="small">audited + reversible</text>
<text x="824" y="622" class="tiny">receipts, canaries, review gates</text>

<text x="118" y="730" class="small">Open source does not mean publishing private state. Kurultai separates reusable operating code from local secrets and live memory.</text>

</svg>