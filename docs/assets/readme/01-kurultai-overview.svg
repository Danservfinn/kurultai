<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840" role="img" aria-labelledby="title desc">
  <title id="title">Kurultai system overview</title>
  <desc id="desc">A native-Hermes multi-agent operating system with Brain memory, Kanban coordination, and recovery loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="12%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#8b5cf6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#334155" stroke-opacity="0.32" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#a78bfa"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .title { font: 800 46px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; letter-spacing: -1.4px; }
      .subtitle { font: 500 19px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .label { font: 800 21px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; }
      .small { font: 650 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .tiny { font: 650 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #94a3b8; }
      .chip { font: 800 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #020617; letter-spacing: .4px; }
      .card { fill: #0f172a; stroke: #334155; stroke-width: 1.4; filter: url(#shadow); }
      .cyan { stroke: #22d3ee; fill: rgba(8, 51, 68, 0.82); }
      .emerald { stroke: #34d399; fill: rgba(6, 78, 59, 0.82); }
      .violet { stroke: #a78bfa; fill: rgba(76, 29, 149, 0.82); }
      .amber { stroke: #fbbf24; fill: rgba(120, 53, 15, 0.78); }
      .rose { stroke: #fb7185; fill: rgba(136, 19, 55, 0.72); }
      .slate { stroke: #94a3b8; fill: rgba(30, 41, 59, 0.82); }
      .arrow { fill: none; stroke: #67e8f9; stroke-width: 3.2; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow2 { fill: none; stroke: #a78bfa; stroke-width: 3; marker-end: url(#arrow2); stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <circle cx="72" cy="70" r="9" fill="#22d3ee" opacity=".95"/>
  <text x="96" y="84" class="title">Kurultai system overview</text>
  <text x="98" y="118" class="subtitle">A native-Hermes multi-agent operating system with Brain memory, Kanban coordination, and recovery loops.</text>
  
<path class="arrow" d="M230 232 C310 232 310 232 390 232"/>
<path class="arrow" d="M590 232 C660 232 660 232 730 232"/>
<path class="arrow" d="M970 232 C1038 232 1038 232 1106 232"/>
<path class="arrow2" d="M875 332 C875 405 760 430 690 490"/>
<path class="arrow2" d="M875 332 C875 405 990 430 1060 490"/>
<path class="arrow" d="M680 602 C720 690 630 720 538 720"/>
<path class="arrow" d="M1060 602 C1018 690 1112 720 1210 720"/>

<rect x="74" y="176" width="156" height="112" rx="18" class="card cyan"/>
<text x="104" y="218" class="label">Operator</text>
<text x="104" y="246" class="small">Telegram / CLI</text>
<text x="104" y="268" class="tiny">one conversation surface</text>

<rect x="390" y="164" width="200" height="136" rx="20" class="card emerald"/>
<text x="438" y="214" class="label">Kublai</text>
<text x="424" y="244" class="small">chair + synthesis layer</text>
<text x="424" y="268" class="tiny">routes work, verifies receipts</text>

<rect x="730" y="132" width="240" height="200" rx="24" class="card violet"/>
<text x="786" y="176" class="label">Native Hermes</text>
<text x="782" y="204" class="small">profiles + Kanban</text>
<text x="760" y="242" class="tiny">Chagatai • Jochi • Temujin</text>
<text x="760" y="264" class="tiny">Mongke • Ogedei • Tolui</text>
<text x="760" y="292" class="tiny">no replacement scheduler</text>

<rect x="1106" y="168" width="210" height="128" rx="20" class="card amber"/>
<text x="1148" y="216" class="label">Workers</text>
<text x="1132" y="246" class="small">tool calls + skills</text>
<text x="1132" y="270" class="tiny">deliver verified artifacts</text>

<rect x="456" y="486" width="250" height="134" rx="22" class="card cyan"/>
<text x="508" y="532" class="label">Brain Wiki</text>
<text x="492" y="562" class="small">durable memory + synthesis</text>
<text x="492" y="586" class="tiny">QMD indexes • receipts • plans</text>

<rect x="1004" y="486" width="260" height="134" rx="22" class="card rose"/>
<text x="1058" y="532" class="label">Recovery Loop</text>
<text x="1038" y="562" class="small">canaries, classifiers, repairs</text>
<text x="1038" y="586" class="tiny">bounded, reversible, auditable</text>

<rect x="398" y="684" width="140" height="72" rx="16" fill="#22d3ee" opacity=".92"/>
<text x="432" y="727" class="chip">LEARN</text>
<rect x="1210" y="684" width="140" height="72" rx="16" fill="#a78bfa" opacity=".92"/>
<text x="1244" y="727" class="chip">IMPROVE</text>

</svg>