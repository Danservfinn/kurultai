<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840" role="img" aria-labelledby="title desc">
  <title id="title">Brain memory and rebuild contract</title>
  <desc id="desc">Durable knowledge lives in the Brain; public git carries only sanitized rebuildable configuration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="12%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#8b5cf6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#334155" stroke-opacity="0.32" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#a78bfa"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .title { font: 800 46px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; letter-spacing: -1.4px; }
      .subtitle { font: 500 19px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .label { font: 800 21px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; }
      .small { font: 650 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .tiny { font: 650 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #94a3b8; }
      .chip { font: 800 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #020617; letter-spacing: .4px; }
      .card { fill: #0f172a; stroke: #334155; stroke-width: 1.4; filter: url(#shadow); }
      .cyan { stroke: #22d3ee; fill: rgba(8, 51, 68, 0.82); }
      .emerald { stroke: #34d399; fill: rgba(6, 78, 59, 0.82); }
      .violet { stroke: #a78bfa; fill: rgba(76, 29, 149, 0.82); }
      .amber { stroke: #fbbf24; fill: rgba(120, 53, 15, 0.78); }
      .rose { stroke: #fb7185; fill: rgba(136, 19, 55, 0.72); }
      .slate { stroke: #94a3b8; fill: rgba(30, 41, 59, 0.82); }
      .arrow { fill: none; stroke: #67e8f9; stroke-width: 3.2; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow2 { fill: none; stroke: #a78bfa; stroke-width: 3; marker-end: url(#arrow2); stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <circle cx="72" cy="70" r="9" fill="#22d3ee" opacity=".95"/>
  <text x="96" y="84" class="title">Brain memory and rebuild contract</text>
  <text x="98" y="118" class="subtitle">Durable knowledge lives in the Brain; public git carries only sanitized rebuildable configuration.</text>
  
<path class="arrow" d="M260 260 C360 260 390 340 470 370"/>
<path class="arrow" d="M260 482 C360 482 390 405 470 392"/>
<path class="arrow" d="M700 382 C780 382 820 280 930 260"/>
<path class="arrow" d="M700 402 C790 402 820 498 930 520"/>
<path class="arrow2" d="M1070 320 C1020 420 890 580 730 640"/>

<rect x="84" y="204" width="198" height="120" rx="22" class="card cyan"/>
<text x="122" y="250" class="label">Sessions</text>
<text x="118" y="280" class="small">operator + agent traces</text>

<rect x="84" y="424" width="198" height="120" rx="22" class="card emerald"/>
<text x="126" y="470" class="label">Receipts</text>
<text x="118" y="500" class="small">canaries + changes</text>

<rect x="470" y="286" width="250" height="190" rx="26" class="card violet"/>
<text x="535" y="336" class="label">Brain</text>
<text x="508" y="368" class="small">wiki + SQLite/QMD indexes</text>
<text x="506" y="404" class="tiny">public/private index split</text>
<text x="506" y="428" class="tiny">Hermes + Brain are the runtime</text>

<rect x="930" y="202" width="250" height="136" rx="22" class="card amber"/>
<text x="982" y="250" class="label">Synthesis</text>
<text x="966" y="280" class="small">patterns become doctrine</text>
<text x="966" y="304" class="tiny">skills, plans, task packets</text>

<rect x="930" y="462" width="250" height="136" rx="22" class="card rose"/>
<text x="982" y="510" class="label">Safety</text>
<text x="966" y="540" class="small">secrets stay local</text>
<text x="966" y="564" class="tiny">sanitized manifests in git</text>

<rect x="474" y="626" width="278" height="92" rx="22" fill="#172554" stroke="#60a5fa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="522" y="666" class="label">Rebuild contract</text>
<text x="508" y="696" class="small">fresh host can reconstruct non-secret surfaces</text>

</svg>