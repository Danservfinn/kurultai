<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840" role="img" aria-labelledby="title desc">
  <title id="title">Fresh install path</title>
  <desc id="desc">A new user can clone, paste the install prompt into an agent, and configure Hermes, Brain, local LLM, and Telegram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="12%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#8b5cf6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#334155" stroke-opacity="0.32" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#a78bfa"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .title { font: 800 46px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; letter-spacing: -1.4px; }
      .subtitle { font: 500 19px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .label { font: 800 21px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; }
      .small { font: 650 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .tiny { font: 650 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #94a3b8; }
      .chip { font: 800 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #020617; letter-spacing: .4px; }
      .card { fill: #0f172a; stroke: #334155; stroke-width: 1.4; filter: url(#shadow); }
      .cyan { stroke: #22d3ee; fill: rgba(8, 51, 68, 0.82); }
      .emerald { stroke: #34d399; fill: rgba(6, 78, 59, 0.82); }
      .violet { stroke: #a78bfa; fill: rgba(76, 29, 149, 0.82); }
      .amber { stroke: #fbbf24; fill: rgba(120, 53, 15, 0.78); }
      .rose { stroke: #fb7185; fill: rgba(136, 19, 55, 0.72); }
      .slate { stroke: #94a3b8; fill: rgba(30, 41, 59, 0.82); }
      .arrow { fill: none; stroke: #67e8f9; stroke-width: 3.2; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow2 { fill: none; stroke: #a78bfa; stroke-width: 3; marker-end: url(#arrow2); stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <circle cx="72" cy="70" r="9" fill="#22d3ee" opacity=".95"/>
  <text x="96" y="84" class="title">Fresh install path</text>
  <text x="98" y="118" class="subtitle">A new user can clone, paste the install prompt into an agent, and configure Hermes, Brain, local LLM, and Telegram.</text>
  
<path class="arrow" d="M206 350 L362 350"/>
<path class="arrow" d="M510 350 L666 350"/>
<path class="arrow" d="M814 350 L970 350"/>
<path class="arrow" d="M1118 350 L1274 350"/>

<rect x="54" y="278" width="180" height="144" rx="22" class="card cyan"/>
<text x="94" y="324" class="label">Clone</text>
<text x="84" y="354" class="small">open repo</text>
<text x="84" y="380" class="tiny">macOS • Linux • Windows</text>

<rect x="362" y="278" width="180" height="144" rx="22" class="card emerald"/>
<text x="396" y="324" class="label">Prompt</text>
<text x="388" y="354" class="small">paste into Codex</text>
<text x="388" y="380" class="tiny">or Claude Code</text>

<rect x="666" y="278" width="180" height="144" rx="22" class="card violet"/>
<text x="696" y="324" class="label">Configure</text>
<text x="694" y="354" class="small">Hermes + Brain</text>
<text x="694" y="380" class="tiny">profiles, skills, cron</text>

<rect x="970" y="278" width="180" height="144" rx="22" class="card amber"/>
<text x="1008" y="324" class="label">Connect</text>
<text x="1000" y="354" class="small">Telegram bot</text>
<text x="1000" y="380" class="tiny">secrets stay local</text>

<rect x="1274" y="278" width="86" height="144" rx="22" class="card rose"/>
<text x="1297" y="336" class="label">Run</text>
<text x="1294" y="368" class="tiny">verify</text>

<rect x="140" y="558" width="1120" height="104" rx="24" fill="#0b1220" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
<text x="180" y="604" class="label">One-shot fresh install</text>
<text x="180" y="638" class="small">docs/operations/fresh-install-agent-prompt.md performs the setup while preserving the secret boundary.</text>
<rect x="982" y="588" width="220" height="48" rx="14" fill="#22d3ee" opacity=".92"/>
<text x="1024" y="619" class="chip">OPEN SOURCE READY</text>

</svg>