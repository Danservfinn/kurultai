<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840" role="img" aria-labelledby="title desc">
  <title id="title">Native Kanban work lifecycle</title>
  <desc id="desc">Every durable task is decomposed, dispatched, verified, and closed with receipts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="12%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#8b5cf6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#334155" stroke-opacity="0.32" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#a78bfa"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .title { font: 800 46px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; letter-spacing: -1.4px; }
      .subtitle { font: 500 19px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .label { font: 800 21px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; }
      .small { font: 650 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .tiny { font: 650 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #94a3b8; }
      .chip { font: 800 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #020617; letter-spacing: .4px; }
      .card { fill: #0f172a; stroke: #334155; stroke-width: 1.4; filter: url(#shadow); }
      .cyan { stroke: #22d3ee; fill: rgba(8, 51, 68, 0.82); }
      .emerald { stroke: #34d399; fill: rgba(6, 78, 59, 0.82); }
      .violet { stroke: #a78bfa; fill: rgba(76, 29, 149, 0.82); }
      .amber { stroke: #fbbf24; fill: rgba(120, 53, 15, 0.78); }
      .rose { stroke: #fb7185; fill: rgba(136, 19, 55, 0.72); }
      .slate { stroke: #94a3b8; fill: rgba(30, 41, 59, 0.82); }
      .arrow { fill: none; stroke: #67e8f9; stroke-width: 3.2; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow2 { fill: none; stroke: #a78bfa; stroke-width: 3; marker-end: url(#arrow2); stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <circle cx="72" cy="70" r="9" fill="#22d3ee" opacity=".95"/>
  <text x="96" y="84" class="title">Native Kanban work lifecycle</text>
  <text x="98" y="118" class="subtitle">Every durable task is decomposed, dispatched, verified, and closed with receipts.</text>
  
<path class="arrow" d="M180 355 L360 355"/>
<path class="arrow" d="M520 355 L700 355"/>
<path class="arrow" d="M860 355 L1040 355"/>
<path class="arrow2" d="M1140 445 C1090 535 830 570 730 620"/>
<path class="arrow2 dash" d="M730 620 C590 690 420 630 350 540"/>

<rect x="78" y="280" width="170" height="150" rx="22" class="card cyan"/>
<text x="118" y="326" class="label">Intake</text>
<text x="110" y="356" class="small">user goal</text>
<text x="110" y="380" class="tiny">proposal, bug, research</text>

<rect x="360" y="250" width="190" height="210" rx="24" class="card emerald"/>
<text x="405" y="296" class="label">Decompose</text>
<text x="393" y="326" class="small">task graph</text>
<text x="393" y="358" class="tiny">parents gate children</text>
<text x="393" y="382" class="tiny">idempotent receipts</text>
<text x="393" y="406" class="tiny">priority + owner</text>

<rect x="700" y="250" width="190" height="210" rx="24" class="card violet"/>
<text x="748" y="296" class="label">Dispatch</text>
<text x="733" y="326" class="small">native profiles</text>
<text x="733" y="358" class="tiny">tool-capable workers</text>
<text x="733" y="382" class="tiny">logs + run records</text>
<text x="733" y="406" class="tiny">no duplicate runtime</text>

<rect x="1040" y="250" width="214" height="210" rx="24" class="card amber"/>
<text x="1084" y="296" class="label">Verify</text>
<text x="1076" y="326" class="small">tests + artifacts</text>
<text x="1076" y="358" class="tiny">Mongke review gates</text>
<text x="1076" y="382" class="tiny">Kublai fan-in</text>
<text x="1076" y="406" class="tiny">operator summary</text>

<rect x="512" y="598" width="246" height="118" rx="22" class="card rose"/>
<text x="562" y="642" class="label">Blocked?</text>
<text x="548" y="672" class="small">clear, split, reassign</text>
<text x="548" y="696" class="tiny">blocked is a queue state, not an end state</text>

<text x="118" y="520" class="small">Every meaningful action lands on the board:</text>
<text x="118" y="548" class="tiny">task row • parent links • comments • run logs • completion receipts</text>

</svg>